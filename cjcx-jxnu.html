<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育技术学班 - 专业素质考评成绩查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #c41e3a 0%, #e53935 50%, #ff6b6b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景纹理 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* 主容器 - 左右布局 */
        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* 左侧查询区域 */
        .container {
            background: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.95) 100%);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255,255,255,0.2) inset;
            padding: 45px;
            width: 550px;
            flex-shrink: 0;
            position: relative;
            border: 3px solid rgba(255,215,0,0.3);
        }

        /* 右侧 JVS 框架 */
        .jvs-panel {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            flex: 1;
            min-width: 600px;
            border: 3px solid rgba(255,215,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .jvs-header {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .jvs-header h2 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .jvs-header a {
            color: #ffd700;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 15px;
            background: rgba(255,215,0,0.2);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .jvs-header a:hover {
            background: rgba(255,215,0,0.3);
        }

        .jvs-frame {
            flex: 1;
            border: none;
            width: 100%;
            min-height: 600px;
        }

        /* 顶部装饰条 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #c41e3a, #ffd700, #c41e3a);
            border-radius: 17px 17px 0 0;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 2px solid #e53935;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .school-badge {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(196,30,58,0.4);
            border: 3px solid #ffd700;
        }

        .school-badge span {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
        }

        .header h1 {
            color: #c41e3a;
            font-size: 26px;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .header .subtitle {
            color: #8b0000;
            font-size: 16px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin-top: 12px;
        }

        .class-badge {
            display: inline-block;
            background: linear-gradient(135deg, #c41e3a, #e53935);
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 3px 10px rgba(196,30,58,0.3);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: #c41e3a;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0c0c0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #fff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c41e3a;
            box-shadow: 0 0 0 3px rgba(196,30,58,0.15);
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .file-upload {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 35px;
            border: 2px dashed #e0c0c0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #fff9f9 0%, #fff 100%);
        }

        .file-upload:hover {
            border-color: #c41e3a;
            background: linear-gradient(135deg, #fff0f0 0%, #fff 100%);
            transform: translateY(-2px);
        }

        .file-upload input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .file-upload-text {
            color: #666;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }

        .file-name {
            margin-top: 12px;
            color: #c41e3a;
            font-size: 14px;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(196,30,58,0.35);
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(196,30,58,0.45);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-page {
            display: none;
        }

        .result-page.active {
            display: block;
        }

        .login-page.hidden {
            display: none;
        }

        .back-btn {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
            margin-bottom: 25px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .page-title {
            text-align: center;
            color: #c41e3a;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e53935;
        }

        .student-info {
            background: linear-gradient(135deg, #fff9f9 0%, #fff 100%);
            border: 2px solid #e53935;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 25px;
        }

        .student-info h3 {
            color: #c41e3a;
            margin-bottom: 18px;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .student-info h3::before {
            content: '📋';
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #e0c0c0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-size: 14px;
        }

        .info-value {
            color: #c41e3a;
            font-weight: 700;
            font-size: 15px;
        }

        .score-card {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(196,30,58,0.35);
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(-30%, -30%); }
            50% { transform: translate(30%, 30%); }
        }

        .score-title {
            font-size: 15px;
            opacity: 0.95;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .score-number {
            font-size: 56px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        .score-detail {
            background: white;
            border-radius: 12px;
            padding: 22px;
            border: 2px solid #e0c0c0;
        }

        .score-detail h3 {
            color: #c41e3a;
            margin-bottom: 18px;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .score-detail h3::before {
            content: '📈';
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .score-item:last-child {
            border-bottom: none;
        }

        .score-item-name {
            color: #666;
            font-size: 15px;
        }

        .score-item-value {
            color: #c41e3a;
            font-weight: 700;
            font-size: 17px;
        }

        .error-message {
            background: linear-gradient(135deg, #ffebee 0%, #fff 100%);
            border: 2px solid #ef5350;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .success-message {
            background: linear-gradient(135deg, #e8f5e9 0%, #fff 100%);
            border: 2px solid #66bb6a;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .multiple-results {
            margin-bottom: 20px;
        }

        .multiple-results h3 {
            color: #c41e3a;
            margin-bottom: 18px;
            font-size: 17px;
            text-align: center;
        }

        .result-option {
            background: linear-gradient(135deg, #fff9f9 0%, #fff 100%);
            border: 2px solid #e0c0c0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .result-option:hover {
            border-color: #c41e3a;
            background: linear-gradient(135deg, #fff0f0 0%, #fff 100%);
            transform: translateX(5px);
        }

        .result-option.selected {
            border-color: #c41e3a;
            background: linear-gradient(135deg, #ffe0e0 0%, #fff 100%);
            box-shadow: 0 4px 15px rgba(196,30,58,0.2);
        }

        .result-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-option-name {
            font-weight: 700;
            color: #c41e3a;
            font-size: 16px;
        }

        .result-option-score {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .result-option-detail {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }

        .confirm-btn {
            margin-top: 18px;
        }

        .photo-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
            border: 2px solid #e0c0c0;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .photo-preview.show {
            display: block;
        }

        .footer-deco {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #e0c0c0;
            color: #999;
            font-size: 12px;
        }

        .rank-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #8b0000;
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 8px;
        }

        /* 移动端响应式 */
        @media (max-width: 1200px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }
            
            .container {
                width: 100%;
                max-width: 550px;
            }
            
            .jvs-panel {
                width: 100%;
                max-width: 800px;
                min-width: auto;
            }
            
            .jvs-frame {
                min-height: 500px;
            }
        }
    </style>
</head>

    <div class="main-container">

                    </div>

                    <div class="form-group">

                </form>

                <div class="footer-deco">
                    教育技术学班 · 专业素质考评系统
                </div>
            </div>

            <!-- 结果页面 -->
            <div class="result-page" id="resultPage">

                <h2 class="page-title">成绩查询结果</h2>

                <div class="student-info">
                    <h3>学生信息</h3>
                    <div class="info-row">
                        <span class="info-label">姓名</span>
                        <span class="info-value" id="resultName"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">学号</span>
                        <span class="info-value" id="resultStudentId"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">班级</span>
                        <span class="info-value">教育技术学班</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">总排名</span>
                        <span class="info-value" id="resultIndex"></span>
                    </div>
                </div>

                <div class="score-card">
                    <div class="score-title">综合成绩</div>
                    <div class="score-number" id="totalScore">0</div>
                </div>

                <div class="score-detail">
                    <h3>成绩明细</h3>
                    <div class="score-item">
                        <span class="score-item-name">大一上学期</span>
                        <span class="score-item-value" id="score1">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-item-name">大一下学期</span>
                        <span class="score-item-value" id="score2">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-item-name">专业成绩</span>
                        <span class="score-item-value" id="score3">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-item-name">综测成绩</span>
                        <span class="score-item-value" id="score4">0</span>
                    </div>
                </div>
            </div>

            <!-- 多结果选择页面 -->
            <div class="result-page" id="selectPage">
                <button class="btn back-btn" onclick="showLoginPage()">← 返回重新查询</button>

                <h2 class="page-title">选择查询结果</h2>

                <div class="multiple-results" id="multipleResults">
                    <h3>⚠️ 找到多位同名同学，请选择：</h3>
                    <div id="optionsList"></div>
                </div>
            </div>
        </div>

        <!-- 右侧 JVS 面板 -->
        <div class="jvs-panel">
            <div class="jvs-header">
                <h2>
                    <span>🏛️</span>
                    江西师范大学
                </h2>
                <a href="https://www.jxnu.edu.cn" target="_blank">访问官网 →</a>
            </div>
            <img src="截图_1779808533983.png" alt="江西师范大学" style="width:100%;height:100%;object-fit:contain;border:none;">
        </div>
    </div>

        let selectedStudent = null;

        // 文件上传处理
        const fileInput = document.getElementById('photo');
        const fileName = document.getElementById('fileName');
        const photoPreview = document.getElementById('photoPreview');

        if (fileInput) {
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    fileName.textContent = file.name;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        photoPreview.src = e.target.result;
                        photoPreview.classList.add('show');
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // 查询成绩
        async function queryScore() {
            const name = document.getElementById('name').value.trim();
            const studentId = document.getElementById('studentId').value.trim();
            const keyword = studentId || name;

            if (!keyword) {
                showMessage('请输入姓名或学号', 'error');
                return;
            }

            const button = document.querySelector('.btn[onclick="queryScore()"]');
            if (button) {
                button.disabled = true;
                button.textContent = '查询中...';
            }

            try {
                const response = await fetch(`${SCORE_API_BASE}/api/scorequery/search?keyword=${encodeURIComponent(keyword)}`);
                if (!response.ok) {
                    throw new Error('后端暂未返回查询结果');
                }

                const payload = await response.json();
                const results = (payload.data || []).map(mapApiStudent);

                if (results.length === 0) {
                    showMessage(`未找到"${keyword}"的成绩记录，请检查输入是否正确`, 'error');
                    return;
                }

                if (results.length === 1) {
                    selectedStudent = results[0];
                    showResult(selectedStudent, selectedStudent.学号 || studentId);
                } else {
                    showSelectPage(results, studentId);
                }
                return;
            } catch (error) {
                console.warn('ScoreQueryDB API unavailable, fallback to local data:', error);
            } finally {
                if (button) {
                    button.disabled = false;
                    button.textContent = '🔍 查询成绩';
                }
            }

            if (!name) {
                showMessage('后端服务未启动时，请输入姓名使用本地备用数据查询', 'error');
                return;
            }

            const results = examData.filter(student => student.姓名 === name);

            if (results.length === 0) {
                showMessage(`未找到姓名为"${name}"的成绩记录，请检查姓名是否正确`, 'error');
                return;
            }

            if (results.length === 1) {
                selectedStudent = results[0];
                showResult(selectedStudent, studentId);
            } else {
                showSelectPage(results, studentId);
            }
        }

        function mapApiStudent(item) {
            return {
                总排名: item.Rank || '--',
                学号: item.StudentID || '',
                姓名: item.StudentName || '',
                班级: item.ClassName || '教育技术学班',
                性别: item.Gender || '',
                考试类型: item.ExamType || '',
                大一上: Number(item.Score1 || 0),
                大一下: Number(item.Score2 || 0),
                专业成绩: Number(item.MajorScore || 0),
                综测成绩: Number(item.ObservationScore || 0),
                综合成绩: Number(item.TotalScore || 0),
                考试日期: item.ExamDate || ''
            };
        }

        function showMessage(text, type) {
            const messageArea = document.getElementById('messageArea');
            messageArea.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${text}</div>`;
            setTimeout(() => {
                messageArea.innerHTML = '';
            }, 5000);
        }

        function showLoginPage() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('selectPage').classList.remove('active');
            document.getElementById('messageArea').innerHTML = '';
            document.getElementById('queryForm').reset();
            fileName.textContent = '';
            photoPreview.classList.remove('show');
            selectedStudent = null;
        }

        function showSelectPage(results, studentId) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('selectPage').classList.add('active');

            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = '';

            results.forEach((student, index) => {
                const option = document.createElement('div');
                option.className = 'result-option';
                option.onclick = () => selectStudent(student, studentId, option);
                option.innerHTML = `
                    <div class="result-option-header">
                        <span class="result-option-name">${student.姓名} <span class="rank-badge">第${student.总排名}名</span></span>
                        <span class="result-option-score">综合：${student.综合成绩.toFixed(2)}</span>
                    </div>
                    <div class="result-option-detail">
                        大一上：${parseFloat(student.大一上).toFixed(2)} | 大一下：${parseFloat(student.大一下).toFixed(2)} | 专业：${parseFloat(student.专业成绩).toFixed(2)}
                    </div>
                `;
                optionsList.appendChild(option);
            });
        }

        function selectStudent(student, studentId, optionElement) {
            document.querySelectorAll('.result-option').forEach(el => el.classList.remove('selected'));
            optionElement.classList.add('selected');
            selectedStudent = student;

            const existingBtn = document.querySelector('.confirm-btn');
            if (existingBtn) existingBtn.remove();

            const confirmBtn = document.createElement('button');
            confirmBtn.className = 'btn confirm-btn';
            confirmBtn.textContent = '确认选择';
            confirmBtn.onclick = () => showResult(student, studentId);

            document.getElementById('optionsList').appendChild(confirmBtn);
        }

        function showResult(student, studentId) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('selectPage').classList.remove('active');
            document.getElementById('resultPage').classList.add('active');

            document.getElementById('resultName').textContent = student.姓名;
            document.getElementById('resultStudentId').textContent = student.学号 || studentId || '未填写';
            document.getElementById('resultIndex').textContent = student.总排名;

            document.getElementById('totalScore').textContent = parseFloat(student.综合成绩).toFixed(2);
            document.getElementById('score1').textContent = parseFloat(student.大一上).toFixed(2);
            document.getElementById('score2').textContent = parseFloat(student.大一下).toFixed(2);
            document.getElementById('score3').textContent = parseFloat(student.专业成绩).toFixed(2);
            document.getElementById('score4').textContent = parseFloat(student.综测成绩).toFixed(2);
        }
    function toggleStudentId() {
        const input = document.getElementById('studentId');
        const btn = document.querySelector('button[onclick="toggleStudentId()"]');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁️';
        }
    }
    </script>
